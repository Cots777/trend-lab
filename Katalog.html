    <script>
        function toggleMenu() {
            var menu = document.getElementById('menu');
            var burger = document.querySelector('.burger');
            menu.classList.toggle('active');
            burger.classList.toggle('active');
        }

        var messages = [
            "Весінній роспродаж на TrendLab! Знижки до 50% на всі категорії товарів. Встигніть придбати найкраще!",
            "Літній розпродаж на TrendLab! Оновіть свій гардероб за вигідними цінами. Акція діє до кінця місяця!",
            "Осінній розпродаж на TrendLab! Теплі речі та аксесуари зі знижками. Не пропустіть сезонні пропозиції!",
            "Зимовий розпродаж на TrendLab! Обирайте стильні речі для холодної пори року зі знижками до 60%!",
            "Спеціальна пропозиція на TrendLab! Безкоштовна доставка при замовленні від 1000 грн. Поспішайте скористатися!"
        ];
        var marquee = document.getElementById('marquee');
        var index = 0;
        function changeMessage() {
            index = (index + 1) % messages.length;
            marquee.textContent = messages[index];
        }

        marquee.addEventListener('finish', changeMessage);
        setInterval(changeMessage, 29000); // смена сообщения каждые 5 секунд
        marquee.style.fontSize = window.innerWidth <= 768 ? "1.05rem" : "1.5rem";
        marquee.style.fontWeight = "bold";
    </script>

    <style>
    .gallery-container {
        max-width: 1200px;
        margin: 100px auto 40px auto;
        padding: 32px 24px;
        background: #fff;
        border-radius: 18px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.08);

    .gallery-title {
        text-align: center;

        margin-bottom: 32px;

    .gallery-row {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-bottom: 24px;
        flex-wrap: wrap;
        object-fit: cover;
    }
    .gallery-item {
        background: #f7cfa2;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.07);

        display: flex;
        flex-direction: column;

    .gallery-item.large {

    .gallery-item img {
        width: 100%;

        object-fit: cover;
        display: block;
        border-bottom: 1px solid #e0b77d;
    }
    .gallery-item.large img {

    }
    .gallery-caption {
        padding: 14px 8px;
        font-size: 1.1rem;
        color: #444;
        text-align: center;
        background: #fff8ef;
        width: 100%;
    }
    .gallery-item:hover {
        transform: translateY(-8px) scale(1.03);
        box-shadow: 0 8px 24px rgba(0,0,0,0.13);
    }
    @media (max-width: 900px) {
        .gallery-row {
            flex-direction: column;
            align-items: center;
        }
        .gallery-item, .gallery-item.large {
            width: 90vw;
            max-width: 350px;
        }
    }
    a img {
        object-fit: cover;
        width: 100%;
        height: 100%;
        display: block;
    }

<script>
function addToFavorites(productId) {
    let favorites = JSON.parse(localStorage.getItem("favorites")) || [];
    if (!favorites.includes(productId)) {
        favorites.push(productId);
        localStorage.setItem("favorites", JSON.stringify(favorites));
        alert("Додано в обране!");
    } else {
        alert("Вже в обраному!");
    }
}
