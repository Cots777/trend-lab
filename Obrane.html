<!DOCTYPE html>
<html lang="ua">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendLab</title>
    <link rel="stylesheet" href="menu.css">
    <link rel="stylesheet" href="galer.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', Arial, sans-serif;
            background: linear-gradient(135deg, #f7cfa2 0%, #f4a261 100%);
            color: #333;
        }

     /*   * {
            box-sizing: border-box;
        } */

      .product {
          width: 240px;
          padding: 12px;
          border: none;
          border-radius: 12px;
          margin: 12px;
          display: inline-flex;
          flex-direction: column;
          text-align: center;
          background: #f7cfa2;
          box-shadow: 0 2px 8px rgba(0,0,0,0.07);
          transition: transform 0.3s, box-shadow 0.3s;
          align-items: center;
      }
      
      .product:hover {
          transform: translateY(-6px) scale(1.02);
          box-shadow: 0 6px 16px rgba(0,0,0,0.12);
      }
      
      .product img {
          width: 100%;
          height: 220px;
          object-fit: cover;
          border-radius: 8px;
          margin-bottom: 10px;
          display: block;
      }
      
      .product h3 {
          margin: 8px 0;
          color: #333;
          font-size: 16px;
          line-height: 1.3;
      }
      
      .remove-btn {
          background-color: #ff6b9d;
          border: none;
          color: white;
          padding: 10px 20px;
          border-radius: 8px;
          cursor: pointer;
          font-size: 14px;
          margin-top: auto;
          transition: background-color 0.2s;
      }
      
      .remove-btn:hover {
          background-color: #ff4081;
      }
      
      .price {
          font-size: 18px;
          color: #ff6b9d;
          font-weight: bold;
          margin: 8px 0;
      }

      .selected-size {
          margin: 2px 0 10px;
          font-size: 14px;
          font-weight: 700;
          color: #6b4f40;
          background: #fff3ea;
          border: 1px solid #f1d6c5;
          border-radius: 999px;
          padding: 6px 12px;
      }
      
      .container {
          max-width: 1400px;
           margin: 100px auto 120px auto;
          padding: 32px 24px;
          background: #fff;
          border-radius: 18px;
          box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      }
      
      .container-header {
          text-align: center;
          margin-bottom: 32px;
      }
      
      .container-header h1 {
          margin: 0;
          font-size: 35px;
          color: #333;
          letter-spacing: 1px;
      }
      
      #favoritesContainer {
          display: flex;
          flex-wrap: wrap;
          justify-content: center;
          min-height: 200px;
      }
      
      .empty-state {
          text-align: center;
          padding: 60px 20px;
          color: #666;
          font-size: 18px;
      }
      
      /* Sticky Footer */
      .sticky-footer {
          position: fixed;
          bottom: 0;
          left: 0;
          right: 0;
          background: linear-gradient(135deg, #fff 0%, #f9f9f9 100%);
          border-top: 2px solid #ddd;
          padding: 16px 24px;
          display: flex;
          justify-content: space-between;
          align-items: center;
          z-index: 100;
          box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
      }
      
      .total-section {
          display: flex;
          align-items: center;
          gap: 20px;
      }
      
      .total-label {
          font-size: 18px;
          color: #666;
          font-weight: 600;
      }
      
      .total-amount {
          font-size: 28px;
          color: #ff6b9d;
          font-weight: bold;
      }
      
      .checkout-btn {
          background: linear-gradient(135deg, #84e74b 0%, #6ecf3a 100%);
          color: #333;
          padding: 14px 40px;
          border-radius: 10px;
          text-decoration: none;
          font-weight: bold;
          font-size: 16px;
          border: none;
          cursor: pointer;
          transition: transform 0.2s, box-shadow 0.2s;
          box-shadow: 0 4px 12px rgba(132, 231, 75, 0.3);
      }
      
      .checkout-btn:hover {
          transform: translateY(-2px);
          box-shadow: 0 6px 18px rgba(132, 231, 75, 0.4);
      }

      .product-modal {
          position: fixed;
          inset: 0;
          z-index: 1200;
          display: none;
          align-items: center;
          justify-content: center;
          padding: 20px;
          background: rgba(0, 0, 0, 0.65);
      }

      .product-modal.open {
          display: flex;
      }

      .product-modal-content {
          width: min(920px, 96vw);
          max-height: 92vh;
          overflow: auto;
          background: #fff;
          border-radius: 16px;
          box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 18px;
          padding: 20px;
          position: relative;
      }

      .modal-close {
          position: absolute;
          top: 12px;
          right: 12px;
          border: none;
          width: 36px;
          height: 36px;
          border-radius: 50%;
          cursor: pointer;
          font-size: 20px;
          background: #f0f0f0;
          color: #333;
      }

      .modal-image {
          width: 100%;
          height: 480px;
          object-fit: cover;
          border-radius: 12px;
      }

      .modal-details {
          padding: 18px 16px;
          display: flex;
          flex-direction: column;
          gap: 14px;
          background: linear-gradient(180deg, #fff7f1 0%, #ffffff 100%);
          border: 1px solid #f0dfd3;
          border-radius: 12px;
      }

      .modal-title {
          margin: 0;
          font-size: 1.8rem;
          line-height: 1.25;
          color: #2f211a;
          font-weight: 800;
      }

      .modal-price {
          margin: 0;
          font-size: 1.5rem;
          font-weight: 800;
          color: #c24776;
      }

      .modal-size-box {
          margin-top: 4px;
          font-size: 1rem;
          font-weight: 700;
          color: #4b362b;
          background: #fff;
          border: 1px solid #e7cdbd;
          border-radius: 10px;
          padding: 10px 12px;
      }

      @media (max-width: 900px) {
          .product-modal-content {
              grid-template-columns: 1fr;
          }

          .modal-image {
              height: 340px;
          }
      }

      .actions-section {
          display: flex;
          align-items: center;
          gap: 12px;
      }
      .continue-btn {
          background: #fff;
          color: #5a3d2b;
          padding: 14px 24px;
          border-radius: 10px;
          text-decoration: none;
          font-weight: 700;
          font-size: 15px;
          border: 1px solid rgba(90, 61, 43, 0.18);
          transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
          white-space: nowrap;
      }
      .continue-btn:hover {
          transform: translateY(-2px);
          background: #fff7f0;
          box-shadow: 0 6px 16px rgba(0,0,0,0.10);
      }
      
      @media (max-width: 768px) {
          .sticky-footer {
              flex-direction: column;
              gap: 12px;
              padding: 12px 16px;
          }
          
          .total-amount {
              font-size: 24px;
          }
          
          .checkout-btn {
              width: 100%;
              padding: 12px 24px;
          }
          .actions-section {
              width: 100%;
              flex-direction: column;
          }
          .continue-btn {
              width: 100%;
              text-align: center;
          }
      }
    </style>
</head>
<body> 
    <div class="marquee">
    <marquee id="marquee" scrollamount="10">Весінній роспродаж на TrendLab! Знижки до 50% на всі категорії товарів. Встигніть придбати найкраще!</marquee>
</div>
<div class="top-nav-fixed">
    <a class="brand-home" href="index.html" aria-label="Перейти на головну">
        <img src="../trand/катего/photo_1_2025-05-25_0012-13-46.jpg" alt="TrendLab">
    </a>
    <div class="burger" onclick="toggleMenu()" aria-label="Відкрити меню" role="button" tabindex="0" onkeydown="if(event.key==='Enter' || event.key===' '){toggleMenu();}">
        <div></div>
        <div></div>
        <div></div>
    </div>
</div>
<div class="top-right-tools">

<div class="menu" id="menu">
    <a href="novin.html">Новинки</a>
    <a href="Katalog.html">Каталог товарів</a>
    <a href="Obrane.html">Обране</a>
    <a href="Kontakt.html">Наші контакти</a>
    <a href="index.html">Про нас ^-^</a>
</div>
<script>
    function toggleMenu() {
        var menu = document.getElementById('menu');
        var burger = document.querySelector('.burger');
        menu.classList.toggle('active');
        burger.classList.toggle('active');
    }

    function closeMenu() {
        var menu = document.getElementById('menu');
        var burger = document.querySelector('.burger');
        if (menu) {
            menu.classList.remove('active');
        }
        if (burger) {
            burger.classList.remove('active');
        }
    }

    window.addEventListener('pageshow', closeMenu);
    document.addEventListener('DOMContentLoaded', function () {
        closeMenu();
        var menuLinks = document.querySelectorAll('#menu a');
        for (var i = 0; i < menuLinks.length; i++) {
            menuLinks[i].addEventListener('click', closeMenu);
        }
    });

    var messages = [
        "Весінній роспродаж на TrendLab! Знижки до 50% на всі категорії товарів. Встигніть придбати найкраще!",
        "Літній розпродаж на TrendLab! Оновіть свій гардероб за вигідними цінами. Акція діє до кінця місяця!",
        "Осінній розпродаж на TrendLab! Теплі речі та аксесуари зі знижками. Не пропустіть сезонні пропозиції!",
        "Зимовий розпродаж на TrendLab! Обирайте стильні речі для холодної пори року зі знижками до 60%!",
        "Спеціальна пропозиція на TrendLab! Безкоштовна доставка при замовленні від 1000 грн. Поспішайте скористатися!"
    ];
    var marquee = document.getElementById('marquee');
    var index = 0;
    function changeMessage() {
        index = (index + 1) % messages.length;
        marquee.textContent = messages[index];
    }

    marquee.addEventListener('finish', changeMessage);
    setInterval(changeMessage, 29000);
    marquee.style.fontSize = window.innerWidth <= 768 ? "1.05rem" : "1.5rem";
    marquee.style.fontWeight = "bold";
</script>
<div class="container">
    <div class="container-header">
        <h1>💕 Обране 💕</h1>
    </div>
    <div id="favoritesContainer"></div>
</div>

<!-- Sticky Footer with Total and Checkout -->
<div class="sticky-footer">
    <div class="total-section">
        <span class="total-label">Сума до оплати:</span>
        <div class="total-amount" id="totalAmount">0₴</div>
    </div>
    <div class="actions-section">
        <a href="Katalog.html" class="continue-btn">↩ Продовжити покупку</a>
        <a href="Oplata.html" class="checkout-btn" id="checkoutBtn">🛒 Перейти до оплати</a>
    </div>
</div>

<div class="product-modal" id="favoriteProductModal">
    <div class="product-modal-content" id="favoriteProductModalContent">
        <button class="modal-close" id="closeFavoriteProductModal" aria-label="Закрити">✕</button>
        <img id="favoriteModalImage" class="modal-image" src="" alt="">
        <div class="modal-details">
            <h2 id="favoriteModalTitle" class="modal-title"></h2>
            <p id="favoriteModalPrice" class="modal-price"></p>
            <div id="favoriteModalSize" class="modal-size-box"></div>
        </div>
    </div>
</div>

<script>
let productsList = [];
let favorites = JSON.parse(localStorage.getItem("favorites")) || [];
const selectedSizes = JSON.parse(localStorage.getItem("selectedSizes")) || {};

async function loadProducts() {
    try {
        const response = await fetch(`products-data.json?cache-bust=${Date.now()}`);
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        if (data && Array.isArray(data.products)) {
            productsList = data.products;
            return;
        }

        throw new Error('Invalid products-data.json format');
    } catch (error) {
        console.warn('Не вдалося завантажити products-data.json, використовую products.js:', error);

        if (typeof allProducts !== 'undefined' && Array.isArray(allProducts)) {
            productsList = allProducts;
        }
    }
}

// Функція для оновлення липкого футера
function updateStickyFooter() {
    const favoriteProducts = productsList.filter(product => favorites.includes(product.id));
    let total = 0;
    
    if (favoriteProducts.length > 0) {
        favoriteProducts.forEach(product => {
            const priceValue = parseFloat(product.price.replace(/[^\d.]/g, ''));
            total += priceValue;
        });
    }
    
    document.getElementById('totalAmount').textContent = total.toFixed(2) + '₴';
    document.getElementById('checkoutBtn').style.display = favoriteProducts.length === 0 ? 'none' : 'block';
}

// Функція для відображення обраних товарів
function renderFavorites() {
    const container = document.getElementById("favoritesContainer");
    const favoriteProducts = productsList.filter(product => favorites.includes(product.id));

    container.innerHTML = '';
    
    if (favoriteProducts.length === 0) {
        container.innerHTML = '<div class="empty-state">📭 Поки що немає обраних товарів. <br/>Перейдіть у <a href="Katalog.html" style="color: #ff6b9d; text-decoration: none;">каталог</a>, щоб додати товари!</div>';
    } else {
        favoriteProducts.forEach(product => {
            const selectedSize = selectedSizes[product.id] || 'Не обрано';
            container.innerHTML += `
                <div class="product" onclick="openFavoriteProductModal(${product.id})">
                    <img src="${product.img}" alt="${product.name}">
                    <h3>${product.name}</h3>
                    <p class="price">${product.price}</p>
                    <div class="selected-size">Розмір: ${selectedSize}</div>
                    <button class="remove-btn" onclick="removeFromFavorites(${product.id}, event)">❌ Видалити</button>
                </div>
            `;
        });
    }
    
    updateStickyFooter();
}

// Функція для видалення з обраного
function removeFromFavorites(productId, event) {
    if (event) {
        event.stopPropagation();
    }

    favorites = favorites.filter(id => id !== productId);
    localStorage.setItem("favorites", JSON.stringify(favorites));
    renderFavorites();
}

function openFavoriteProductModal(productId) {
    const product = productsList.find(item => item.id === productId);
    if (!product) {
        return;
    }

    const modal = document.getElementById('favoriteProductModal');
    const image = document.getElementById('favoriteModalImage');
    const title = document.getElementById('favoriteModalTitle');
    const price = document.getElementById('favoriteModalPrice');
    const size = document.getElementById('favoriteModalSize');

    image.src = product.img;
    image.alt = product.name;
    title.textContent = product.name;
    price.textContent = product.price || '';
    size.textContent = 'Обраний розмір: ' + (selectedSizes[product.id] || 'Не обрано');

    modal.classList.add('open');
}

function closeFavoriteProductModal() {
    const modal = document.getElementById('favoriteProductModal');
    modal.classList.remove('open');
}

document.getElementById('closeFavoriteProductModal').addEventListener('click', closeFavoriteProductModal);
document.getElementById('favoriteProductModal').addEventListener('click', function (event) {
    if (event.target.id === 'favoriteProductModal') {
        closeFavoriteProductModal();
    }
});

document.addEventListener('keydown', function (event) {
    if (event.key === 'Escape') {
        closeFavoriteProductModal();
    }
});

// Викликаємо функції після завантаження даних
loadProducts().then(renderFavorites);
</script>
</body>
</html>
