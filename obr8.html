<script>
    function toggleMenu() {
        var menu = document.getElementById('menu');
        var burger = document.querySelector('.burger');
        menu.classList.toggle('active');
        burger.classList.toggle('active');
    }

    var messages = [
        "Весінній роспродаж на TrendLab! Знижки до 50% на всі категорії товарів. Встигніть придбати найкраще!",
        "Літній розпродаж на TrendLab! Оновіть свій гардероб за вигідними цінами. Акція діє до кінця місяця!",
        "Осінній розпродаж на TrendLab! Теплі речі та аксесуари зі знижками. Не пропустіть сезонні пропозиції!",
        "Зимовий розпродаж на TrendLab! Обирайте стильні речі для холодної пори року зі знижками до 60%!",
        "Спеціальна пропозиція на TrendLab! Безкоштовна доставка при замовленні від 1000 грн. Поспішайте скористатися!"
    ];
    var marquee = document.getElementById('marquee');
    var index = 0;
    function changeMessage() {
        index = (index + 1) % messages.length;
        marquee.textContent = messages[index];
    }

    marquee.addEventListener('finish', changeMessage);
    setInterval(changeMessage, 29000);
    marquee.style.fontSize = window.innerWidth <= 768 ? "1.05rem" : "1.5rem";
    marquee.style.fontWeight = "bold";

        TrendLabSearch.initHomepageSearch({
            inputId: "homepageSearchInput",
            buttonId: "homepageSearchButton",
            suggestionsId: "homepageSearchSuggestions",
            targetUrl: "catalog.html"
        });</script>

<style>   
    .container {
        max-width: 1400px;
        margin: 100px auto 40px auto;
      padding: 40px 24px;
      background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%);
      border-radius: 18px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;

    }
</style>
  <style>
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
    }

    .container h1 {
      width: 100%;
      color: #333;
      font-size: 2.5rem;
      margin-bottom: 30px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
    }

    .product {
      width: 280px;
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
      transition: all 0.3s ease;
      padding: 0;
      text-align: center;
      display: flex;
      flex-direction: column;
    }

    .product:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.18);
    }

    .product img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
    }

    .product h3 {
      margin: 15px 10px 20px 10px;
      font-size: 1.1rem;
      color: #333;
      flex-grow: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .favorite-btn {
      margin: 0 10px 15px 10px;
      background-color: #fff;
      border: 2px solid #ff6b9d;
      cursor: pointer;
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      color: #ff6b9d;
      transition: all 0.3s ease;
    }

    .favorite-btn:hover {
      background-color: #ff6b9d;
      color: #fff;
      transform: scale(1.05);
    }

    .favorite-btn.active {
      background-color: #ff6b9d;
      color: white;
      border-color: #ff6b9d;
    }

    .favorite-btn.active:hover {
      background-color: #ff4081;
      border-color: #ff4081;
    }
  </style>
</head>
