<script>
    function toggleMenu() {
        var menu = document.getElementById('menu');
        var burger = document.querySelector('.burger');
        menu.classList.toggle('active');
        burger.classList.toggle('active');
    }

    var messages = [
        "Весінній роспродаж на TrendLab! Знижки до 50% на всі категорії товарів. Встигніть придбати найкраще!",
        "Літній розпродаж на TrendLab! Оновіть свій гардероб за вигідними цінами. Акція діє до кінця місяця!",
        "Осінній розпродаж на TrendLab! Теплі речі та аксесуари зі знижками. Не пропустіть сезонні пропозиції!",
        "Зимовий розпродаж на TrendLab! Обирайте стильні речі для холодної пори року зі знижками до 60%!",
        "Спеціальна пропозиція на TrendLab! Безкоштовна доставка при замовленні від 1000 грн. Поспішайте скористатися!"
    ];
    var marquee = document.getElementById('marquee');
    var index = 0;
    function changeMessage() {
        index = (index + 1) % messages.length;
        marquee.textContent = messages[index];
    }

    marquee.addEventListener('finish', changeMessage);
    setInterval(changeMessage, 29000);
    marquee.style.fontSize = window.innerWidth <= 768 ? "1.05rem" : "1.5rem";
    marquee.style.fontWeight = "bold";
</script>

    <script src="products.js"></script>
    <script src="render-products.js"></script>
    <script>
      (function () {
        var originalOpenProductModal = window.openProductModal;
        var colorMap = {
          1: [
            { name: 'Молочний', value: '#f5ede3' },
            { name: 'Рожевий', value: '#f8c7d8' },
            { name: 'Чорний', value: '#1f1f1f' },
            { name: 'Бежевий', value: '#d8c2a5' }
          ],
          2: [
            { name: 'Золотий', value: '#c8a24a' },
            { name: 'Срібний', value: '#c9ced6' },
            { name: 'Перлинний', value: '#f2efe8' }
          ],
          3: [
            { name: 'Срібний', value: '#c9ced6' },
            { name: 'Золотий', value: '#c8a24a' },
            { name: 'Рожевий', value: '#e8a9c0' }
          ],
          4: [
            { name: 'Чорний', value: '#111111' },
            { name: 'Коричневий', value: '#7b4b2a' },
            { name: 'Прозорий', value: '#dfe8f3' }
          ]
        };

        function getSelectedColors() {
          return JSON.parse(localStorage.getItem('selectedColors')) || {};
        }

        function setSelectedColors(selectedColors) {
          localStorage.setItem('selectedColors', JSON.stringify(selectedColors));
        }

        function ensureColorStyles() {
          if (document.getElementById('obr1-color-styles')) {
            return;
          }

          var style = document.createElement('style');
          style.id = 'obr1-color-styles';
          style.textContent = `
            .modal-color-title {
              font-weight: 700;
              color: #4b362b;
              font-size: 1rem;
              text-transform: uppercase;
              letter-spacing: 0.6px;
              margin-top: 2px;
            }
            .color-options {
              display: flex;
              flex-wrap: wrap;
              gap: 8px;
              margin-top: -2px;
            }
            .color-btn {
              min-width: 92px;
              border: 2px solid #d8c6bb;
              background: #fff;
              border-radius: 12px;
              padding: 8px 10px;
              font-weight: 700;
              cursor: pointer;
              color: #3f2d23;
              display: inline-flex;
              align-items: center;
              gap: 8px;
              transition: all 0.2s ease;
            }
            .color-btn:hover {
              border-color: #c27e69;
              background: #fff7f2;
            }
            .color-btn.active {
              border-color: #7a5a48;
              box-shadow: 0 6px 14px rgba(122, 90, 72, 0.22);
              transform: translateY(-1px);
            }
            .color-swatch {
              width: 18px;
              height: 18px;
              border-radius: 50%;
              border: 1px solid rgba(0, 0, 0, 0.14);
              flex: 0 0 auto;
            }
            .selected-variant-info {
              padding: 10px 12px;
              border-radius: 12px;
              background: #fff4e7;
              border: 1px solid #f0dfd3;
              color: #5b4035;
              font-weight: 700;
              line-height: 1.35;
            }
            .size-guide-link {
              display: inline-flex;
              align-items: center;
              justify-content: center;
              gap: 8px;
              width: 100%;
              min-height: 48px;
              padding: 12px 16px;
              border-radius: 14px;
              text-decoration: none;
              font-weight: 800;
              color: #fff;
              background: linear-gradient(135deg, #b7522a 0%, #d86734 100%);
              box-shadow: 0 10px 20px rgba(183, 82, 42, 0.24);
              border: 1px solid rgba(255, 255, 255, 0.35);
              transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
            }
            .size-guide-link:hover {
              transform: translateY(-1px);
              box-shadow: 0 14px 26px rgba(183, 82, 42, 0.3);
              filter: brightness(1.02);
            }
          `;
          document.head.appendChild(style);
        }

        function ensureColorBlock() {
          var details = document.querySelector('#productModal .modal-details');
          if (!details) {
            return null;
          }

          var existing = document.getElementById('modalColorOptionsWrap');
          if (existing) {
            return existing;
          }

          var colorTitle = document.createElement('div');
          colorTitle.className = 'modal-color-title';
          colorTitle.textContent = 'Оберіть колір:';

          var colorOptions = document.createElement('div');
          colorOptions.id = 'modalColorOptions';
          colorOptions.className = 'color-options';

          var selectedInfo = document.createElement('div');
          selectedInfo.id = 'modalSelectedVariant';
          selectedInfo.className = 'selected-variant-info';

          var sizeGuideLink = document.createElement('a');
          sizeGuideLink.className = 'size-guide-link';
          sizeGuideLink.href = 'dodatok.html';
          sizeGuideLink.textContent = 'Підібрати розмір';

          var wrap = document.createElement('div');
          wrap.id = 'modalColorOptionsWrap';
          wrap.appendChild(colorTitle);
          wrap.appendChild(colorOptions);
          wrap.appendChild(selectedInfo);
          wrap.appendChild(sizeGuideLink);

          var actions = details.querySelector('.modal-actions');
          details.insertBefore(wrap, actions);
          return wrap;
        }

        function renderColorOptions(productId) {
          ensureColorStyles();

          var colorOptionsEl = document.getElementById('modalColorOptions');
          var selectedInfoEl = document.getElementById('modalSelectedVariant');
          var productColors = colorMap[productId] || colorMap[1];
          var selectedColors = getSelectedColors();
          var currentColor = selectedColors[productId] || productColors[0].name;

          if (!colorOptionsEl || !selectedInfoEl) {
            return;
          }

          colorOptionsEl.innerHTML = productColors.map(function (color) {
            var isActive = color.name === currentColor ? 'active' : '';
            return '\n                        <button class="color-btn ' + isActive + '" type="button" data-color="' + color.name + '" data-color-value="' + color.value + '">\n                            <span class="color-swatch" style="background:' + color.value + '"></span>\n                            ' + color.name + '\n                        </button>\n                    ';
          }).join('');

          colorOptionsEl.querySelectorAll('.color-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
              var chosenColor = this.dataset.color;
              var colorsMap = getSelectedColors();
              colorsMap[productId] = chosenColor;
              setSelectedColors(colorsMap);

              colorOptionsEl.querySelectorAll('.color-btn').forEach(function (item) {
                item.classList.remove('active');
              });
              this.classList.add('active');
              selectedInfoEl.textContent = 'Обраний колір: ' + chosenColor;
            });
          });

          selectedInfoEl.textContent = 'Обраний колір: ' + currentColor;
        }

        window.openProductModal = function (productId) {
          originalOpenProductModal(productId);
          ensureColorBlock();
          renderColorOptions(productId);
        };
      })();
    </script>
<style>   
    .container {
        max-width: 1400px;

      flex-wrap: wrap;
      justify-content: center;

</style>
  <style>
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
    }

    .container h1 {
      width: 100%;
      color: #333;
      font-size: 2.5rem;
      margin-bottom: 30px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
    }

    .product {
      width: 280px;
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
      transition: all 0.3s ease;
      padding: 0;
      text-align: center;
      display: flex;
      flex-direction: column;
    }

    .product:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.18);
    }

    .product img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
    }

    .product h3 {
      margin: 15px 10px 20px 10px;
      font-size: 1.1rem;
      color: #333;
      flex-grow: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .favorite-btn {
      margin: 0 10px 15px 10px;
      background-color: #fff;
      border: 2px solid #ff6b9d;
      cursor: pointer;
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      color: #ff6b9d;
      transition: all 0.3s ease;
    }

    .favorite-btn:hover {
      background-color: #ff6b9d;
      color: #fff;
      transform: scale(1.05);
    }

    .favorite-btn.active {
      background-color: #ff6b9d;
      color: white;
      border-color: #ff6b9d;
    }

    .favorite-btn.active:hover {
      background-color: #ff4081;
      border-color: #ff4081;
    }

    #productsContainer {
      align-items: stretch;
    }

    #productsContainer .product {
      display: flex;
      flex-direction: column;
    }
  </style>
</head>

<div class="container">

<script>
